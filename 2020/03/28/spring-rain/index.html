    <h1 class="article-title">好雨知时节吗</h1>
  </div>
   <div class="post-meta">
    <span class="post-time">2020-03-28</span>
  </div>
  <div class="post-content">
    <p>下了一夜雨，下了一夜的往事。又是三月雨。</p>
<p>早起后，淅淅沥沥的雨还在恍恍惚惚的下。</p>
<p>阴沉潮湿的空气，昏暗的房间。</p>
<p>不想开灯，唯恐破坏了这种氛围，竟然对这种原始的气氛有些不舍，真是好玩。</p>
<p>听着几首老歌，低沉冗长的音色把时间都拉长了很多。</p>
<p>不知道自己能不能听出自己的声音，或者能不能想象出自己呐喊的神情。</p>
